server:
  port: 8080

spring:
  datasource:
    url: jdbc:sqlite:petshop.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always
  data:
    mongodb:
      uri: mongodb://localhost:27017/petshop

jwt:
  secret: petshop-secret-key-for-jwt-token-generation-must-be-long-enough-2024-pet
  expiration: 86400000

